<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>משחק הזירות הגדול</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .header { position: sticky; top: 0; background: white; padding: 20px; border-bottom: 2px solid #4a90e2; display: flex; gap: 10px; z-index: 100; }
        .q-card { background: white; padding: 20px; margin-top: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ans-group { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
        input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 80%; }
        .count { font-size: 11px; color: #777; width: 60px; }
    </style>
</head>
<body>
    <div class="header">
        <select id="zSelect">
            <option value="1">זירה 1</option><option value="2">זירה 2</option><option value="3">זירה 3</option>
            <option value="4">זירה 4</option><option value="5">זירה 5</option><option value="6">זירה 6</option>
            <option value="7">זירה 7</option><option value="8">זירה 8</option><option value="9">זירה 9</option>
            <option value="Al">זירת על</option>
        </select>
        <button onclick="load()">טען שאלות</button>
        <button style="background:#28a745; color:white;" onclick="save()">שמור הכל לענן</button>
    </div>
    <div id="list"></div>

   <script type="module">
    import { QuizDataManager } from './CloudManager.js';
        let data = [], id = "";
        window.load = async () => {
            id = document.getElementById('zSelect').value;
            data = await QuizDataManager.getZiraData(id, window[`DATA_ZIRA_${id}`]);
            render();
        };
        function render() {
            document.getElementById('list').innerHTML = data.map((q, qI) => `
                <div class="q-card">
                    <b>שאלה ${qI+1}:</b> <input type="text" value="${q.q}" oninput="data[${qI}].q = this.value"><br>
                    <div class="ans-group">
                        ${q.a.map((a, aI) => `
                            <div style="display:flex; gap:10px; align-items:center;">
                                <input type="radio" name="c_${qI}" ${q.correct === aI ? 'checked' : ''} onchange="data[${qI}].correct=${aI}">
                                <input type="text" value="${a}" oninput="data[${qI}].a[${aI}]=this.value; this.nextElementSibling.innerText=this.value.length+' תווים'">
                                <span class="count">${a.length} תווים</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        window.save = async () => { await QuizDataManager.updateZiraData(id, data); alert("נשמר בענן!"); };
    </script>
</body>
</html>
