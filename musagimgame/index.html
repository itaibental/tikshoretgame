<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizComm | תרגול מושגי תקשורת</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="app-container" class="w-full max-w-2xl px-4 py-8">
        
        <div id="screen-welcome" class="card p-8 text-center">
            <h1 class="text-5xl font-black mb-6 text-blue-400">QuizComm</h1>
            <div class="flex flex-col gap-4 mb-8">
                <input type="text" id="input-username" placeholder="שם התלמיד/ה" 
                       class="w-full bg-black/40 border border-white/20 p-4 rounded-xl text-center text-xl text-white outline-none focus:border-blue-500 transition-all">
                <input type="text" id="input-school" placeholder="שם בית הספר" 
                       class="w-full bg-black/40 border border-white/20 p-4 rounded-xl text-center text-xl text-white outline-none focus:border-blue-500 transition-all">
            </div>
            
            <div class="mb-8 p-4 bg-white/5 rounded-2xl">
                <p class="text-blue-300 mb-2 font-bold text-lg">בחר רמת קושי (1-5):</p>
                <div class="flex justify-between gap-2">
                    <button onclick="GameEngine.setDifficulty(1)" class="diff-btn flex-grow py-2 rounded-lg border border-white/20 hover:bg-blue-500/20 active" data-val="1">1</button>
                    <button onclick="GameEngine.setDifficulty(2)" class="diff-btn flex-grow py-2 rounded-lg border border-white/20 hover:bg-blue-500/20" data-val="2">2</button>
                    <button onclick="GameEngine.setDifficulty(3)" class="diff-btn flex-grow py-2 rounded-lg border border-white/20 hover:bg-blue-500/20" data-val="3">3</button>
                    <button onclick="GameEngine.setDifficulty(4)" class="diff-btn flex-grow py-2 rounded-lg border border-white/20 hover:bg-blue-500/20" data-val="4">4</button>
                    <button onclick="GameEngine.setDifficulty(5)" class="diff-btn flex-grow py-2 rounded-lg border border-white/20 hover:bg-blue-500/20" data-val="5">5</button>
                </div>
            </div>

            <button onclick="GameEngine.goToSelection()" class="btn-primary w-full py-4 rounded-2xl text-2xl font-bold">המשך לבחירת זירות</button>
        </div>

        <div id="screen-selection" class="hidden card p-8">
            <div id="step-1-arenas">
                <h2 class="text-3xl font-bold mb-6 text-center">שלב 1: בחר זירות</h2>
                <div id="arena-list" class="grid grid-cols-1 gap-3 mb-6 max-h-64 overflow-y-auto pr-2"></div>
                <button onclick="GameEngine.goToConceptSelection()" class="btn-primary w-full py-4 rounded-2xl text-xl font-bold">המשך לבחירת מושגים</button>
            </div>

            <div id="step-2-concepts" class="hidden">
                <h2 class="text-3xl font-bold mb-6 text-center text-blue-400">שלב 2: בחר מושגים</h2>
                <div id="concept-list" class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-6 max-h-80 overflow-y-auto pr-2"></div>
                <div class="flex flex-col gap-3">
                    <button onclick="GameEngine.startGame()" class="btn-primary w-full py-4 rounded-2xl text-xl font-bold">התחל משחק!</button>
                    <button onclick="GameEngine.backToArenas()" class="text-gray-400 text-sm">חזור לבחירת זירות</button>
                </div>
            </div>
        </div>

        <div id="screen-game" class="hidden flex flex-col gap-4">
            <div class="flex justify-between items-center px-4 py-2 bg-black/30 rounded-xl border border-white/10 text-sm">
                <div class="flex flex-col">
                    <span id="display-player" class="font-bold text-blue-400"></span>
                    <span id="display-school" class="text-xs text-gray-400"></span>
                </div>
                <div class="flex gap-4 items-center">
                    <span id="display-difficulty" class="bg-blue-500/20 px-2 py-1 rounded text-blue-300">רמה: 1</span>
                    <span id="display-timer" class="text-red-400 font-mono text-lg font-bold">60s</span>
                    <span id="display-score" class="text-green-400 font-bold">0</span>
                </div>
            </div>
            <div class="card p-8">
                <div id="display-arena" class="text-xs uppercase tracking-widest text-blue-400 mb-2 font-bold"></div>
                <h3 id="display-question" class="text-2xl font-bold mb-8 leading-tight"></h3>
                <div id="options-container" class="grid gap-3"></div>
            </div>
            <div id="feedback-area" class="hidden card p-6 border-r-4 border-blue-500">
                <p id="feedback-text" class="text-gray-200 mb-4"></p>
                <button id="next-btn" class="btn-primary px-8 py-3 rounded-xl font-bold">המשך</button>
            </div>
        </div>

        <div id="screen-results" class="hidden card p-10 text-center">
            <h2 class="text-4xl font-black mb-4 text-blue-400">כל הכבוד!</h2>
            <div class="text-7xl font-black mb-8" id="final-score-val">0</div>
            <div class="bg-white/5 p-6 rounded-2xl mb-8 text-right inline-block mx-auto min-w-[250px]">
                <p class="mb-2"><span class="text-gray-400">תלמיד/ה:</span> <span id="res-name" class="font-bold"></span></p>
                <p class="mb-2"><span class="text-gray-400">בית ספר:</span> <span id="res-school" class="font-bold"></span></p>
                <p class="mb-2"><span class="text-gray-400">רמת קושי:</span> <span id="res-difficulty" class="font-bold"></span></p>
                <p class="mb-0"><span class="text-gray-400">סבבים שבוצעו:</span> <span id="res-rounds" class="font-bold"></span></p>
            </div>
            <button onclick="location.reload()" class="btn-primary w-full py-4 rounded-2xl text-xl font-bold">משחק חדש</button>
        </div>
    </div>

    <script src="js/data/zira1.js"></script><script src="js/data/zira2.js"></script><script src="js/data/zira3.js"></script>
    <script src="js/data/zira4.js"></script><script src="js/data/zira5.js"></script><script src="js/data/zira6.js"></script>
    <script src="js/data/zira7.js"></script><script src="js/data/zira8.js"></script><script src="js/data/zira9.js"></script>
    <script src="js/data/ziraAl.js"></script>
    <script src="js/audio.js"></script>
    <script type="module" src="js/engine.js"></script>
</body>
</html>
