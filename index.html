<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizComm | פורטל משחקי תקשורת</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --game-blue: #0077ff;
            --game-cyan: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Rubik', sans-serif;
            background: radial-gradient(circle at center, #0a192f 0%, #020617 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* אפקט זכוכית לקונטיינר */
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* כפתורי משחק */
        .game-card {
            position: relative;
            background: rgba(0, 119, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(0, 119, 255, 0.2);
            border-color: var(--game-cyan);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        /* אפקט הבהוב */
        .game-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; transition: property duration timing-function delay; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        /* עיטורים בסגנון משחק */
        .corner-accent {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--game-cyan);
        }
        .top-left { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        .glow-text {
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .pulsate {
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }
    </style>
</head>
<body>
    <div class="glass-container p-12 w-full max-w-2xl text-center relative z-10">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-cyan-600/20 rounded-full blur-3xl"></div>

        <h1 class="text-6xl font-black mb-2 glow-text tracking-tighter italic">QUIZ<span class="text-cyan-400">COMM</span></h1>
        <p class="text-blue-300 mb-12 font-light tracking-widest uppercase text-sm">מרכז הלמידה הדיגיטלי לתקשורת</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="zirotgame/index.html" class="game-card p-8 group pulsate">
                <div class="corner-accent top-left"></div>
                <div class="corner-accent bottom-right"></div>
                <div class="text-4xl mb-3">🏟️</div>
                <h2 class="text-2xl font-bold text-white group-hover:text-cyan-400 transition-colors">משחק זירות</h2>
                <p class="text-gray-400 text-sm mt-2">תרגול לפי זירות התוכן</p>
                <div class="mt-4 flex justify-center">
                    <span class="bg-blue-500/20 text-blue-400 text-[10px] px-3 py-1 rounded-full border border-blue-500/30 uppercase font-bold">Zirot Game</span>
                </div>
            </a>

            <a href="musagimgame/index.html" class="game-card p-8 group">
                <div class="corner-accent top-left"></div>
                <div class="corner-accent bottom-right"></div>
                <div class="text-4xl mb-3">🧠</div>
                <h2 class="text-2xl font-bold text-white group-hover:text-cyan-400 transition-colors">משחק מושגים</h2>
                <p class="text-gray-400 text-sm mt-2">תרגול מושגי יסוד</p>
                <div class="mt-4 flex justify-center">
                    <span class="bg-cyan-500/20 text-cyan-400 text-[10px] px-3 py-1 rounded-full border border-cyan-500/30 uppercase font-bold">Concepts Game</span>
                </div>
            </a>
        </div>

        <div class="mt-12 pt-6 border-t border-white/10">
            <p class="text-gray-500 text-xs">בחר משחק כדי להתחיל בתרגול</p>
        </div>
    </div>
</body>
</html>
