<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון הזירות הגדול | איתי בן טל</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="stars-container">
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
    </div>

    <div id="countdown-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-lg">
        <div id="countdown-text" class="text-white text-9xl font-black italic scale-animate"></div>
    </div>

    <div id="app-container" class="w-full max-w-2xl px-4 py-8">
        
        <div id="screen-welcome" class="card p-8 text-center animate-pop">
            <h1 class="text-4xl md:text-5xl font-black mb-2 text-blue-400">חידון הזירות הגדול</h1>
            <p class="text-gray-400 mb-8 font-light italic">תרגול מושגים לבגרות בתקשורת וחברה</p>
            
            <div class="flex flex-col gap-4 mb-8">
                <input type="text" id="input-username" placeholder="שם מלא של התלמיד/ה" 
                       class="w-full bg-black/40 border border-white/20 p-4 rounded-xl text-center text-xl text-white outline-none focus:border-blue-500 transition-all">
                <input type="text" id="input-school" placeholder="שם בית הספר" 
                       class="w-full bg-black/40 border border-white/20 p-4 rounded-xl text-center text-xl text-white outline-none focus:border-blue-500 transition-all">
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <button onclick="window.GameEngine.setGameMode('manual')" class="mode-btn p-6 rounded-2xl border-2 border-white/10 bg-white/5 hover:border-blue-500 transition-all">
                    <span class="block text-2xl mb-2">🎯</span>
                    <span class="font-bold text-lg">בחירה ידנית</span>
                    <span class="block text-xs text-gray-400">בחר זירות ומושגים בעצמך</span>
                </button>
                <button onclick="window.GameEngine.setGameMode('levels')" class="mode-btn p-6 rounded-2xl border-2 border-white/10 bg-white/5 hover:border-blue-500 transition-all">
                    <span class="block text-2xl mb-2">🏆</span>
                    <span class="font-bold text-lg">משחק לפי רמות</span>
                    <span class="block text-xs text-gray-400">שאלות רנדומליות לפי קושי</span>
                </button>
            </div>

            <div id="difficulty-selector" class="hidden mb-8 p-5 bg-white/5 rounded-2xl border border-white/10">
                <p class="text-blue-300 mb-4 font-bold text-lg text-center">בחר רמת קושי:</p>
                <div class="flex flex-wrap justify-between gap-2">
                    <button onclick="window.GameEngine.setDifficulty('easy')" class="diff-btn flex-grow py-3 px-4 rounded-xl border border-white/10 active-diff" data-val="easy">קלה</button>
                    <button onclick="window.GameEngine.setDifficulty('medium')" class="diff-btn flex-grow py-3 px-4 rounded-xl border border-white/10" data-val="medium">בינונית</button>
                    <button onclick="window.GameEngine.setDifficulty('hard')" class="diff-btn flex-grow py-3 px-4 rounded-xl border border-white/10" data-val="hard">קשה</button>
                    <button onclick="window.GameEngine.setDifficulty('v-hard')" class="diff-btn flex-grow py-3 px-4 rounded-xl border border-white/10" data-val="v-hard">קשה מאוד</button>
                </div>
            </div>

            <button id="main-action-btn" onclick="window.GameEngine.handleMainAction()" class="btn-primary w-full py-4 rounded-2xl text-2xl font-bold mb-4 shadow-blue-500/20 opacity-50 cursor-not-allowed" disabled>בחר מצב משחק</button>
            
            <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                <button onclick="window.GameEngine.showLeaderboard()" class="py-3 bg-white/5 rounded-xl text-sm border border-white/10 hover:bg-white/10">🏆 לוח תוצאות</button>
                <button onclick="window.GameEngine.showAdmin()" class="py-3 bg-white/5 rounded-xl text-sm border border-white/10 hover:bg-white/10">🔐 ניהול מורה</button>
            </div>
        </div>

        <div id="screen-selection" class="hidden card p-8">
            <div id="step-1-arenas">
                <h2 class="text-3xl font-bold mb-6 text-center">שלב 1: בחירת זירות</h2>
                <div id="arena-list" class="grid grid-cols-1 gap-3 mb-8 max-h-64 overflow-y-auto pr-2 text-right"></div>
                <button onclick="window.GameEngine.goToConceptSelection()" class="btn-primary w-full py-4 rounded-2xl text-xl font-bold">המשך לבחירת מושגים</button>
            </div>
            <div id="step-2-concepts" class="hidden">
                <h2 class="text-3xl font-bold mb-4 text-center text-blue-400">שלב 2: בחירת מושגים</h2>
                <div id="concept-list" class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-8 max-h-80 overflow-y-auto pr-2 text-right"></div>
                <button onclick="window.GameEngine.initCountdown()" class="btn-primary w-full py-4 rounded-2xl text-xl font-bold">התחל משחק!</button>
            </div>
        </div>

        <div id="screen-game" class="hidden flex flex-col gap-4">
            <div class="flex justify-between items-center px-4 py-3 bg-black/40 rounded-2xl border border-white/10">
                <div class="text-right">
                    <span id="display-player" class="font-bold text-blue-400 text-lg"></span><br>
                    <span id="display-school" class="text-xs text-gray-400 italic"></span>
                </div>
                <div class="flex gap-4 items-center">
                    <span id="display-timer" class="text-red-400 font-mono text-2xl font-bold">60s</span>
                    <div id="display-score" class="text-green-400 font-bold text-xl bg-white/5 px-4 py-1 rounded-xl">0</div>
                </div>
            </div>
            <div class="card p-8">
                <div id="display-arena" class="text-xs uppercase text-blue-400 mb-2 font-bold border-b border-white/10 pb-2 text-right"></div>
                <h3 id="display-question" class="text-2xl font-bold mb-8 text-white text-right leading-tight"></h3>
                <div id="options-container" class="grid gap-3 text-right"></div>
            </div>
            <div id="feedback-area" class="hidden card p-6 border-r-4 border-blue-500">
                <p id="feedback-text" class="text-gray-200 text-right"></p>
                <button id="next-btn" class="btn-primary mt-6 px-10 py-3 rounded-xl font-bold">המשך</button>
            </div>
        </div>

        <div id="screen-data-view" class="hidden card p-8 flex flex-col max-h-[85vh]">
            <h2 id="data-title" class="text-3xl font-bold mb-6 text-center text-blue-400"></h2>
            <div id="data-content" class="overflow-y-auto flex-grow mb-6 bg-black/30 rounded-2xl p-4 border border-white/5"></div>
            <button onclick="location.reload()" class="btn-primary w-full py-3 rounded-xl font-bold">חזור למסך הראשי</button>
        </div>

        <div id="screen-results" class="hidden card p-10 text-center">
            <h2 class="text-4xl font-black mb-2 text-blue-400">סיכום תרגול</h2>
            <div class="text-8xl font-black mb-8 text-white" id="final-score-val">0</div>
            <div class="bg-black/40 p-6 rounded-3xl mb-8 text-right border border-white/10 inline-block mx-auto min-w-[300px]">
                <p class="mb-3 border-b border-white/5 pb-2 flex justify-between"><span id="res-name" class="font-bold"></span><span>:תלמיד/ה</span></p>
                <p class="mb-3 border-b border-white/5 pb-2 flex justify-between"><span id="res-school" class="font-bold"></span><span>:בית ספר</span></p>
                <p class="mb-3 border-b border-white/5 pb-2 flex justify-between"><span id="res-diff" class="font-bold text-blue-400"></span><span>:רמת קושי</span></p>
                <p class="flex justify-between"><span id="res-rounds" class="font-bold text-yellow-500"></span><span>:סבבי משחק</span></p>
            </div>
            <button onclick="location.reload()" class="btn-primary w-full py-4 rounded-2xl text-xl font-bold">משחק חדש</button>
        </div>

        <footer class="mt-12 text-center text-white/30 text-xs font-light">המשחק נוצר ע"י איתי בן טל</footer>
    </div>

    <script src="js/data/zira1.js"></script><script src="js/data/zira2.js"></script><script src="js/data/zira3.js"></script>
    <script src="js/data/zira4.js"></script><script src="js/data/zira5.js"></script><script src="js/data/zira6.js"></script>
    <script src="js/data/zira7.js"></script><script src="js/data/zira8.js"></script><script src="js/data/zira9.js"></script>
    <script src="js/data/ziraAl.js"></script>
    <script src="js/audio.js"></script>
    <script type="module" src="js/engine.js"></script>
</body>
</html>
