<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>musagimgames | עולם המושגים</title>
    
    <script src="js/zira1.js"></script><script src="js/zira2.js"></script><script src="js/zira3.js"></script>
    <script src="js/zira4.js"></script><script src="js/zira5.js"></script><script src="js/zira6.js"></script>
    <script src="js/zira7.js"></script><script src="js/zira8.js"></script><script src="js/zira9.js"></script>
    <script src="js/ziraAl.js"></script>

    <style>
        :root {
            --primary: #4a90e2;
            --accent: #ff9f43;
            --success: #2ecc71;
            --danger: #ee5253;
            --bg: #f8f9fc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { color: var(--primary); font-size: 3em; margin-bottom: 10px; letter-spacing: -1px; }
        .welcome-text { color: #576574; margin-bottom: 40px; font-size: 1.2em; }

        /* תפריט זירות */
        .zira-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
        }

        .zira-card {
            background: white;
            border: 2px solid #f1f2f6;
            padding: 25px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .zira-card:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(74, 144, 226, 0.1);
        }

        .zira-card strong { font-size: 1.3em; color: #2d3436; }
        .zira-card small { color: #8395a7; margin-top: 5px; }

        /* אזור המשחק */
        #quiz-view { display: none; text-align: right; }
        .q-text { font-size: 1.8em; font-weight: bold; margin-bottom: 30px; color: #2d3436; line-height: 1.3; }
        
        .ans-btn {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border: 2px solid #f1f2f6;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            font-size: 1.15em;
            transition: 0.2s;
            text-align: right;
        }

        .ans-btn:hover:not(:disabled) { background: #f0f7ff; border-color: var(--primary); }
        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }

        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            display: none;
            line-height: 1.6;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* כפתורי ניווט */
        .btn-main {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn-next { background: var(--primary); color: white; }
        .btn-back { background: #ced6e0; color: #2f3542; margin-right: 10px; }

        /* סקשן מורה */
        .admin-footer {
            margin-top: 50px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .teacher-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #f1f2f6;
            color: #747d8c;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 600;
            transition: 0.2s;
        }
        .teacher-btn:hover { background: #2f3542; color: white; }

        /* לואדר */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-container">
    <div id="menu-view">
        <h1>musagimgames</h1>
        <p class="welcome-text">מוכנים לבגרות? בחרו זירה והתחילו לתרגל</p>
        
        <div class="zira-grid">
            <div class="zira-card" onclick="startQuiz('1')"><strong>זירה 1</strong><small>יסודות</small></div>
            <div class="zira-card" onclick="startQuiz('2')"><strong>זירה 2</strong><small>גלובליזציה</small></div>
            <div class="zira-card" onclick="startQuiz('3')"><strong>זירה 3</strong><small>עיתונות</small></div>
            <div class="zira-card" onclick="startQuiz('4')"><strong>זירה 4</strong><small>דמוקרטיה</small></div>
            <div class="zira-card" onclick="startQuiz('5')"><strong>זירה 5</strong><small>דיגיטל</small></div>
            <div class="zira-card" onclick="startQuiz('6')"><strong>זירה 6</strong><small>ריאליטי</small></div>
            <div class="zira-card" onclick="startQuiz('7')"><strong>זירה 7</strong><small>קליפים</small></div>
            <div class="zira-card" onclick="startQuiz('8')"><strong>זירה 8</strong><small>ספורט</small></div>
            <div class="zira-card" onclick="startQuiz('9')"><strong>זירה 9</strong><small>פרסום</small></div>
            <div class="zira-card" onclick="startQuiz('Al')" style="border-color: #ff9f43; background: #fffaf5;"><strong>זירת העל</strong><small>סיכום כללי</small></div>
        </div>

        <div class="admin-footer">
            <a href="teacher.html" class="teacher-btn">⚙️ כניסת מורה לעריכת שאלות</a>
        </div>
    </div>

    <div id="main-loader" class="loader"></div>

    <div id="quiz-view">
        <div style="color: #a4b0be; margin-bottom: 10px;" id="q-count">שאלה 1 מתוך --</div>
        <div class="q-text" id="question-label">טוען שאלה...</div>
        <div id="options-list"></div>
        
        <div id="feedback-area" class="feedback"></div>

        <div style="display: flex; justify-content: center; gap: 15px;">
            <button id="next-button" class="btn-main btn-next" style="display:none;" onclick="goNext()">לשאלה הבאה</button>
            <button class="btn-main btn-back" onclick="location.reload()">חזרה לתפריט</button>
        </div>
    </div>
</div>

<script type="module">
    import { QuizDataManager } from './CloudManager.js';

    let currentQuestions = [];
    let currentIndex = 0;

    window.startQuiz = async (id) => {
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('main-loader').style.display = 'block';

        const fallback = window[`DATA_ZIRA_${id}`];
        currentQuestions = await QuizDataManager.getZiraData(id, fallback);

        document.getElementById('main-loader').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'block';
        currentIndex = 0;
        renderQ();
    };

    function renderQ() {
        const q = currentQuestions[currentIndex];
        document.getElementById('q-count').innerText = `שאלה ${currentIndex + 1} מתוך ${currentQuestions.length}`;
        document.getElementById('question-label').innerText = q.q;
        document.getElementById('feedback-area').style.display = 'none';
        document.getElementById('next-button').style.display = 'none';

        const list = document.getElementById('options-list');
        list.innerHTML = '';

        q.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'ans-btn';
            b.innerText = txt;
            b.onclick = () => check(i, b);
            list.appendChild(b);
        });
    }

    function check(selected, btn) {
        const q = currentQuestions[currentIndex];
        const allBtns = document.querySelectorAll('.ans-btn');
        allBtns.forEach(b => b.disabled = true);

        if (selected === q.correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            allBtns[q.correct].classList.add('correct');
        }

        const fb = document.getElementById('feedback-area');
        fb.style.display = 'block';
        fb.style.background = selected === q.correct ? '#e3fcef' : '#fff0f0';
        fb.innerHTML = `<strong>${selected === q.correct ? 'כל הכבוד!' : 'לא נורא...'}</strong><br>${q.rationale}`;

        if (currentIndex < currentQuestions.length - 1) {
            document.getElementById('next-button').style.display = 'inline-block';
        }
    }

    window.goNext = () => {
        currentIndex++;
        renderQ();
    };
</script>

</body>
</html>
